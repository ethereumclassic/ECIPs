name: Jekyll Workflow

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    - name: Build the Jekyll site
      if: github.repository == 'ethereumclassic/ECIPs'
      run: bundle exec jekyll build --future
